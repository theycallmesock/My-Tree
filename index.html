<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackr | Personal Media Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts & Phosphor Icons for modern UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <i class="ph-fill ph-infinity"></i>
                <h2>Trackr.</h2>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="dashboard"><i class="ph ph-squares-four"></i> Dashboard</li>
                <li data-view="anime"><i class="ph ph-television"></i> Anime</li>
                <li data-view="games"><i class="ph ph-game-controller"></i> Games</li>
                <li data-view="profile"><i class="ph ph-user"></i> Profile</li>
            </ul>
            <div class="sidebar-bottom">
                <button id="theme-toggle" class="btn-icon"><i class="ph ph-sun"></i> Toggle Theme</button>
                <button id="export-btn" class="btn-icon"><i class="ph ph-download-simple"></i> Export Data</button>
                <label class="btn-icon upload-label">
                    <i class="ph ph-upload-simple"></i> Import JSON
                    <input type="file" id="import-btn" accept=".json" style="display: none;">
                </label>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="global-search" placeholder="Search your library...">
                </div>
                <button id="add-new-btn" class="btn-primary"><i class="ph ph-plus"></i> Add Entry</button>
            </header>

            <!-- Views Container -->
            <div id="views">
                <!-- Dashboard View -->
                <section id="view-dashboard" class="view active">
                    <h1 class="page-title">Overview</h1>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Anime</h3>
                            <p id="stat-anime">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Total Games</h3>
                            <p id="stat-games">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Average Rating</h3>
                            <p id="stat-rating">0.0 <i class="ph-fill ph-star" style="color: gold; font-size: 1.2rem;"></i></p>
                        </div>
                    </div>
                    <h2 class="section-title">Recently Added</h2>
                    <div id="recent-grid" class="media-grid"></div>
                </section>

                <!-- Anime Library View -->
                <section id="view-anime" class="view">
                    <div class="view-header">
                        <h1 class="page-title">Anime Library</h1>
                        <div class="filters" id="anime-filters">
                            <button class="filter-btn active" data-status="all">All</button>
                            <button class="filter-btn" data-status="watching">Watching</button>
                            <button class="filter-btn" data-status="completed">Completed</button>
                            <button class="filter-btn" data-status="planned">Planned</button>
                            <button class="filter-btn" data-status="dropped">Dropped</button>
                        </div>
                    </div>
                    <div id="anime-grid" class="media-grid"></div>
                </section>

                <!-- Game Library View -->
                <section id="view-games" class="view">
                    <div class="view-header">
                        <h1 class="page-title">Game Library</h1>
                        <div class="filters" id="game-filters">
                            <button class="filter-btn active" data-status="all">All</button>
                            <button class="filter-btn" data-status="playing">Playing</button>
                            <button class="filter-btn" data-status="completed">Completed</button>
                            <button class="filter-btn" data-status="planned">Planned</button>
                            <button class="filter-btn" data-status="dropped">Dropped</button>
                        </div>
                    </div>
                    <div id="game-grid" class="media-grid"></div>
                </section>

                <!-- Profile View -->
                <section id="view-profile" class="view">
                    <div class="profile-header">
                        <img src="https://images.unsplash.com/photo-1560233026-ad254fa8dba4?w=400&q=80" alt="Avatar" class="profile-avatar">
                        <div class="profile-info">
                            <h1>User101</h1>
                            <p>Media enthusiast. Tracking everything I watch and play.</p>
                            <div class="social-links">
                                <i class="ph ph-discord-logo"></i>
                                <i class="ph ph-twitter-logo"></i>
                                <i class="ph ph-github-logo"></i>
                            </div>
                        </div>
                    </div>
                    <h2 class="section-title" style="margin-top: 2rem;">Currently Active</h2>
                    <div id="active-grid" class="media-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit/View -->
    <div id="media-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal"><i class="ph ph-x"></i></span>
            <h2 id="modal-title">Add New Entry</h2>
            
            <form id="media-form">
                <input type="hidden" id="entry-id">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="entry-title" required placeholder="e.g., Attack on Titan">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="entry-type" required>
                            <option value="anime">Anime</option>
                            <option value="game">Video Game</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="entry-status" required>
                            <option value="watching">Watching / Playing</option>
                            <option value="completed">Completed</option>
                            <option value="planned">Plan to Watch/Play</option>
                            <option value="dropped">Dropped</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Rating: <span id="rating-val">5</span>/10</label>
                    <input type="range" id="entry-rating" min="1" max="10" value="5" step="1">
                </div>

                <div class="form-group">
                    <label>Cover Image URL</label>
                    <input type="url" id="entry-image" placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group">
                    <label>Notes / Review</label>
                    <textarea id="entry-notes" rows="3" placeholder="Your thoughts..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-delete" class="btn-danger hidden">Delete</button>
                    <button type="submit" class="btn-primary">Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
